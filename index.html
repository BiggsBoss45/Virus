<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GENESIS SIMULATION CORE</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:#00ffcc;
}

/* ===== SPACE ===== */
#space{
    position:relative;
    width:100vw;
    height:100vh;
    perspective:1200px;
}

#camera{
    position:absolute;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition: transform 2s ease-in-out;
}

/* ===== UI ===== */
#ui{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    z-index:999;
}

input,button{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:10px;
    font-family:monospace;
}

button:hover{
    background:#00ffcc;
    color:black;
}

#rnaDisplay{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
}

/* ===== VIRUS ===== */
#virusContainer{
    position:absolute;
    top:40%;
    left:35%;
    width:220px;
    height:260px;
    transform:scale(0);
    opacity:0;
    transition:all 1s ease;
}

#capsidShell{
    width:100px;
    height:100px;
    position:absolute;
    left:60px;
    top:0;
    clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
    border:2px solid #00ffcc;
    box-shadow:0 0 20px #00ffcc;
}

#tailTube{
    position:absolute;
    width:20px;
    height:70px;
    left:100px;
    top:100px;
    border:2px solid #00ffcc;
}

#injector{
    position:absolute;
    width:4px;
    height:0px;
    left:108px;
    top:170px;
    background:#00ffcc;
    box-shadow:0 0 10px #00ffcc;
    transition:height 0.8s ease;
}

.leg{
    position:absolute;
    width:60px;
    height:2px;
    background:#00ffcc;
    transform-origin:left;
    top:150px;
    left:110px;
}

.leg1{transform:rotate(20deg);}
.leg2{transform:rotate(50deg);}
.leg3{transform:rotate(80deg);}
.leg4{transform:rotate(-20deg);}
.leg5{transform:rotate(-50deg);}
.leg6{transform:rotate(-80deg);}

/* ===== BACTERIA ===== */
#bacteria{
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    border:2px solid #00ffcc;
    top:50%;
    left:60%;
    transform:scale(0);
    opacity:0;
    transition:all 1s ease;
}

/* ===== RNA LETTERS ===== */
.rnaChar{
    font-size: 24px;
    color: #00ffcc;
    transition: all 1s ease;
}
</style>
</head>

<body>

<div id="ui">
    <input id="rnaInput" placeholder="Enter RNA sequence">
    <button onclick="startSimulation()">GENERATE</button>
</div>

<div id="space">
<div id="camera">

    <div id="virusContainer">
        <div id="capsidShell"></div>
        <div id="tailTube"></div>
        <div id="injector"></div>

        <div class="leg leg1"></div>
        <div class="leg leg2"></div>
        <div class="leg leg3"></div>
        <div class="leg leg4"></div>
        <div class="leg leg5"></div>
        <div class="leg leg6"></div>
    </div>

    <div id="bacteria"></div>

</div>
</div>

<div id="rnaDisplay"></div>

<script>

const runBtn = document.getElementById("runBtn");
const rnaInput = document.getElementById("rnaInput");

const rnaLayer = document.getElementById("viralRNA");
const phage = document.getElementById("phage");
const ecoli = document.getElementById("ecoli");
const logBox = document.getElementById("simulationLog");

const needle = document.querySelector(".tailNeedle");
const sheath = document.querySelector(".tailSheath");

const CORRECT_RNA = "AUGCGAUCGUAACGUGCUAUGCGA";

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
}

/* =========================
   VALIDATION
========================= */
function validateRNA(rna){

    const clean = rna.toUpperCase().trim();

    if(!/^[AUGC]+$/.test(clean)){
        return {ok:false, msg:"ERROR: INVALID RNA BASES DETECTED"};
    }

    if(clean !== CORRECT_RNA){
        return {ok:false, msg:"SEQUENCE REJECTED: GENESIS KEY NOT FOUND"};
    }

    return {ok:true, clean};
}

/* =========================
   RNA → ENERGY PARTICLES
========================= */
async function renderRNA(rna){

    rnaLayer.innerHTML = "";
    rnaLayer.style.opacity = 1;

    const chars = [];

    for(let c of rna){
        const span = document.createElement("span");
        span.className = "rnaChar";
        span.innerText = c;

        span.style.position = "absolute";
        span.style.left = Math.random()*80 + "%";
        span.style.top = Math.random()*60 + "%";

        rnaLayer.appendChild(span);
        chars.push(span);

        await sleep(60);
    }

    await sleep(600);

    for(let s of chars){
        s.style.left = "50%";
        s.style.top = "45%";
        s.style.transform = "translate(-50%,-50%) scale(0)";
        s.style.opacity = "0";
    }

    await sleep(900);
    rnaLayer.innerHTML = "";
}

/* =========================
   PHAGE ASSEMBLY
========================= */
async function assemblePhage(){

    logBox.innerText = "PHAGE STRUCTURE ASSEMBLING...";

    phage.style.opacity = 1;
    phage.style.transform = "scale(1)";

    await sleep(900);

    logBox.innerText = "TAIL SYSTEM INITIALIZED";
}

/* =========================
   INJECTION SEQUENCE
========================= */
async function inject(){

    logBox.innerText = "DOCKING ONTO E.COLI...";

    ecoli.style.opacity = 1;

    await sleep(700);

    sheath.style.transform = "scaleY(1.4)";
    await sleep(500);

    needle.style.height = "120px";

    ecoli.style.boxShadow = "0 0 40px red";
    ecoli.style.transform = "scale(1.05)";

    await sleep(800);
}

/* =========================
   MUTATION EVENT
========================= */
async function mutate(){

    logBox.innerText = "HOST GENOME COMPROMISED...";

    await sleep(700);

    ecoli.style.background =
        "radial-gradient(circle,#ff0044,#220000)";

    ecoli.style.borderColor = "red";

    await sleep(700);

    logBox.innerText =
        "ANOMALY DETECTED: MITOCHONDRIAL STRUCTURE FORMED INSIDE PROKARYOTE";
}

/* =========================
   MAIN PIPELINE
========================= */
runBtn.onclick = async () => {

    const result = validateRNA(rnaInput.value);

    if(!result.ok){
        logBox.innerText = result.msg;
        return;
    }

    logBox.innerText = "SEQUENCE ACCEPTED";

    await sleep(600);

    await renderRNA(result.clean);
    await assemblePhage();
    await inject();
    await mutate();
};

</script>

</body>
</html>
