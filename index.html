<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GENESIS SIMULATION CORE</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:#00ffcc;
}

#space{
    position:relative;
    width:100vw;
    height:100vh;
    perspective:1200px;
}

#camera{
    position:absolute;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition: transform 2s ease-in-out;
}

/* BACKGROUND */
.layer{
    position:absolute;
    width:100%;
    height:100%;
}

/* E. COLI CELL */
#ecoli{
    width:180px;
    height:180px;
    border-radius:50%;
    border:2px solid #00ffcc;
    position:absolute;
    top:50%;
    left:60%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 10px #00ffcc;
    opacity:0;
    overflow:hidden;
}

/* CAPSID */
#capsid{
    position:absolute;
    width:120px;
    height:120px;
    top:50%;
    left:30%;
    transform:translate(-50%,-50%) scale(0);
    opacity:1;
}

/* NODE + EDGE */
.node{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:#00ffcc;
}

.edge{
    position:absolute;
    height:2px;
    background:#00ffcc;
    transform-origin:left center;
}

/* MITOCHONDRIA (IMPOSSIBLE ORGANELLE) */
.mito{
    position:absolute;
    width:50px;
    height:25px;
    border-radius:50%;
    background:radial-gradient(circle,#ffcc00,#ff6600);
    box-shadow:0 0 40px orange;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
}

#ui{
    position:absolute;
    top:10px;
    width:100%;
    text-align:center;
}

input,button{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:8px;
}
</style>
</head>

<body>

<div id="ui">
<input id="rnaInput" placeholder="RNA sequence">
<button onclick="start()">RUN</button>
</div>

<div id="space">
<div id="camera">

<div id="capsid"></div>
<div id="ecoli">
    <div class="mito" id="mito"></div>
</div>

</div>
</div>

<script>

const capsid = document.getElementById("capsid");
const ecoli = document.getElementById("ecoli");
const mito = document.getElementById("mito");
const camera = document.getElementById("camera");

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* =========================
   CAPSID CONSTRUCTION
========================= */
async function buildCapsid(){

    capsid.innerHTML = "";
    capsid.style.transform = "translate(-50%,-50%) scale(1)";

    const points = [
        [0,-40],[35,-20],[35,20],
        [0,40],[-35,20],[-35,-20]
    ];

    let nodes = [];

    for(let i=0;i<points.length;i++){
        const n = document.createElement("div");
        n.className="node";
        n.style.left = (60 + points[i][0])+"px";
        n.style.top = (60 + points[i][1])+"px";
        capsid.appendChild(n);
        nodes.push(n);
        await sleep(120);
    }

    for(let i=0;i<nodes.length;i++){
        const a = nodes[i];
        const b = nodes[(i+1)%nodes.length];

        const e = document.createElement("div");
        e.className="edge";

        const dx = b.offsetLeft - a.offsetLeft;
        const dy = b.offsetTop - a.offsetTop;

        const len = Math.sqrt(dx*dx + dy*dy);

        e.style.width = len+"px";
        e.style.left = a.offsetLeft+"px";
        e.style.top = a.offsetTop+"px";
        e.style.transform = `rotate(${Math.atan2(dy,dx)}rad)`;

        capsid.appendChild(e);

        await sleep(80);
    }
}

/* =========================
   FLIGHT
========================= */
async function flyCapsid(){
    capsid.style.transition = "all 2s ease";
    capsid.style.transform = "translate(200px,-40px) scale(1.2)";
    await sleep(2000);

    capsid.style.transform = "translate(420px,20px) scale(1.4)";
    await sleep(2000);
}

/* =========================
   DOCKING
========================= */
async function dock(){

    ecoli.style.opacity = 1;

    ecoli.style.transition = "all 0.8s ease";
    ecoli.style.boxShadow = "0 0 60px #00ffcc";
    ecoli.style.transform = "translate(-50%,-50%) scale(1.05)";

    capsid.style.transform = "translate(450px,40px) scale(1.5)";

    await sleep(1200);
}

/* =========================
   IMPOSSIBLE MITOCHONDRIA REVEAL
========================= */
async function revealMito(){

    ecoli.style.filter = "contrast(1.5) brightness(1.3)";
    ecoli.style.boxShadow = "0 0 100px red";

    await sleep(800);

    mito.style.opacity = 1;
    mito.style.transition = "all 1.2s ease";
    mito.style.transform = "translate(-50%,-50%) scale(0.2)";

    await sleep(800);

    mito.style.transform = "translate(-50%,-50%) scale(1)";
    mito.style.boxShadow = "0 0 80px orange";

    await sleep(800);

    mito.style.transform = "translate(-50%,-50%) scale(1.4)";
    mito.style.boxShadow = "0 0 120px yellow,0 0 160px orange";

    ecoli.style.boxShadow = "0 0 140px white";
}

/* =========================
   MASTER SEQUENCE
========================= */
async function start(){

    const input = document.getElementById("rnaInput");
    const rna = input.value.trim();

    if(!rna){
        alert("Enter RNA sequence");
        return;
    }

    // visual confirmation (THIS fixes your “I can’t input” feeling)
    document.getElementById("rnaInput").blur();

    const display = document.createElement("div");
    display.style.position = "absolute";
    display.style.bottom = "20px";
    display.style.width = "100%";
    display.style.textAlign = "center";
    display.style.color = "#00ffcc";
    display.innerText = "RNA LOCKED: " + rna;
    document.body.appendChild(display);

    camera.style.transform = "scale(1)";

    await buildCapsid();
    await flyCapsid();
    await dock();
    await sleep(800);
    await revealMito();

    camera.style.transform = "scale(1.6)";
}

</script>

</body>
</html>
