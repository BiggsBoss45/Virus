<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GENESIS SIMULATION CORE</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:#00ffcc;
}

/* STAGE */
#stage{
    position:relative;
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:1000px;
}

/* CAMERA */
#camera{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    transform:scale(1);
    transition: transform 2s ease-in-out;
}

/* BACTERIA (FIXED POSITIONING) */
#bacteria{
    width:160px;
    height:160px;
    border-radius:50%;
    border:2px solid #00ffcc;
    position:absolute;
    opacity:0;
    box-shadow:0 0 10px #00ffcc;
    transition: all 1s ease;
}

/* VIRUS */
#virus{
    width:60px;
    height:60px;
    border-radius:50%;
    background:radial-gradient(circle, #00ffcc, #003333);
    box-shadow:0 0 20px #00ffcc;
    opacity:0;
    transform:scale(0);
    position:absolute;
    transition: all 1.2s ease-in-out;
}

/* RNA */
#rnaDisplay{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    font-size:14px;
    z-index:10;
}

/* MITOCHONDRIA */
.mito{
    width:20px;
    height:10px;
    background:#00ffcc;
    border-radius:5px;
    position:absolute;
    opacity:0;
}

/* UI */
#ui{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    z-index:10;
}

input, button{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:10px;
    pointer-events:auto;
}

button:hover{
    background:#00ffcc;
    color:black;
}

/* SHAKE */
@keyframes shake {
    0% { transform: translate(0,0) scale(1.05); }
    25% { transform: translate(3px,-2px) scale(1.05); }
    50% { transform: translate(-3px,2px) scale(1.05); }
    75% { transform: translate(2px,2px) scale(1.05); }
    100% { transform: translate(0,0) scale(1.05); }
}
</style>
</head>

<body>

<div id="ui">
    <input id="rnaInput" placeholder="Enter RNA sequence">
    <button onclick="startSimulation()">GENERATE</button>
</div>

<div id="stage">
    <div id="camera">

        <div id="bacteria"></div>
        <div id="virus"></div>

        <div id="cell">
            <div class="mito" id="m1"></div>
            <div class="mito" id="m2"></div>
            <div class="mito" id="m3"></div>
        </div>

    </div>
</div>

<div id="rnaDisplay"></div>

<script>

const virus = document.getElementById("virus");
const bacteria = document.getElementById("bacteria");
const camera = document.getElementById("camera");
const rnaDisplay = document.getElementById("rnaDisplay");

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
}

async function startSimulation(){

    const rna = document.getElementById("rnaInput").value;
    if(!rna){
        alert("RNA sequence required");
        return;
    }

    /* RESET */
    virus.style.opacity = 0;
    virus.style.transform = "scale(0)";
    bacteria.style.opacity = 1;
    bacteria.style.transform = "scale(1)";
    bacteria.style.boxShadow = "0 0 10px #00ffcc";
    bacteria.style.borderColor = "#00ffcc";

    camera.style.transform = "scale(1)";
    rnaDisplay.innerText = "";

    /* RNA DISPLAY */
    rnaDisplay.innerText = "RNA SEQUENCE LOCKED: " + rna;

    await sleep(1000);

    /* VIRUS BUILD */
    virus.style.opacity = 1;
    virus.style.transform = "scale(0.3)";
    await sleep(700);

    virus.style.transform = "scale(0.6)";
    await sleep(700);

    virus.style.transform = "scale(1)";
    await sleep(700);

    /* CAMERA ZOOM */
    camera.style.transform = "scale(1.6)";
    await sleep(1200);

    /* BACTERIA APPEARS STRONGER */
    bacteria.style.opacity = 1;

    await sleep(500);

    /* DOCKING PHASE (CENTERED + CLEAN) */
    virus.style.transform = "translate(-80px,0px) scale(1.1)";
    await sleep(1000);

    virus.style.transform = "translate(-95px,10px) scale(1.05)";
    await sleep(900);

    virus.style.transform = "translate(-100px,0px) scale(1.2)";
    bacteria.style.animation = "shake 0.4s";

    await sleep(400);

    bacteria.style.animation = "";

    /* ATTACHMENT */
    virus.style.transform = "translate(-100px,0px) scale(0.9)";
    virus.style.boxShadow = "0 0 40px red";

    bacteria.style.boxShadow = "0 0 60px red";
    bacteria.style.borderColor = "red";

    await sleep(800);

    /* MUTATION */
    bacteria.style.background = "radial-gradient(circle, #ff0044, #220000)";
    bacteria.style.transform = "scale(1.2)";

    rnaDisplay.innerText = "HOST MODIFICATION COMPLETE: GENESIS VARIANT FORMED";
}

</script>

</body>
</html>
