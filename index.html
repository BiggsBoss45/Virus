<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VIRUS SIMULATION CORE</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ffcc;
    font-family:monospace;
    overflow:hidden;
}

/* =========================
   GLOBAL LAYERS
========================= */

.screen{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    opacity:0;
    pointer-events:none;
    transition:2s ease;
}

.active{
    opacity:1;
    pointer-events:auto;
}

/* =========================
   CINEMATIC BACKDROP
========================= */

#bgGlow{
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle at center, rgba(0,255,200,0.08), transparent 60%),
        radial-gradient(circle at top, rgba(0,255,200,0.05), transparent 70%);
    animation:pulse 6s infinite alternate;
}

@keyframes pulse{
    from{ transform:scale(1); opacity:0.5;}
    to{ transform:scale(1.1); opacity:1;}
}

/* =========================
   RNA VISUAL
========================= */

#rna{
    font-size:18px;
    letter-spacing:6px;
    opacity:0;
    transform:scale(0.8);
    transition:3s ease;
}

.rnaActive{
    opacity:1;
    transform:scale(1.2);
    text-shadow:0 0 15px #00ffcc;
}

/* =========================
   VIRUS CORE
========================= */

#virusCore{
    width:120px;
    height:120px;
    border:2px solid #00ffcc;
    border-radius:50%;
    margin-top:30px;
    opacity:0;
    transform:scale(0.5);
    transition:3s ease;
    box-shadow:0 0 0px #00ffcc;
}

.coreActive{
    opacity:1;
    transform:scale(1.4);
    box-shadow:0 0 40px #00ffcc;
}

/* infection pulse */
.infect{
    animation:infectPulse 1s infinite alternate;
}

@keyframes infectPulse{
    from{ filter:hue-rotate(0deg) brightness(1);}
    to{ filter:hue-rotate(120deg) brightness(1.5);}
}

/* =========================
   TEXT CINEMA
========================= */

h1{
    text-shadow:0 0 20px #00ffcc;
    letter-spacing:3px;
}

.fadeText{
    opacity:0;
    transform:translateY(20px);
    transition:2s;
}

.showText{
    opacity:1;
    transform:translateY(0);
}

/* INPUT */
input, button{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:10px;
    font-family:monospace;
    margin-top:10px;
}

button:hover{
    background:#00ffcc;
    color:black;
}
</style>
</head>

<body>

<div id="bgGlow"></div>

<!-- RNA INPUT -->
<div id="screen1" class="screen active">
    <h1>RNA INPUT REQUIRED</h1>
    <input id="rnaInput" placeholder="Paste RNA sequence">
    <button onclick="startSequence()">INITIALIZE</button>
</div>

<!-- BUILD -->
<div id="screen2" class="screen">
    <h1 class="fadeText" id="t1">SEQUENCE ACCEPTED</h1>
    <div id="rna">AUGCGAUCGUAACGUGCUAUGCGA</div>
    <div id="virusCore"></div>
</div>

<!-- INFECTION -->
<div id="screen3" class="screen">
    <h1 class="fadeText" id="t2">INFECTION EVENT DETECTED</h1>
    <p class="fadeText" id="t3">HOST: E. COLI // STATUS: COMPROMISED</p>
</div>

<!-- NAME -->
<div id="screen4" class="screen">
    <h1>ENTITY FORMATION</h1>
    <p>ENTERBACTERIA ________</p>
    <input id="nameInput">
    <button onclick="checkName()">CONFIRM</button>
</div>

<!-- FINAL -->
<div id="screen5" class="screen">
    <h1 id="finalName">ENTEROBACTERIA GENESIS</h1>
    <p class="fadeText" id="finalText">SYSTEM CREATION COMPLETE</p>
</div>

<script>

const correctRNA = "AUGCGAUCGUAACGUGCUAUGCGA";

function show(id){
    document.querySelectorAll(".screen")
    .forEach(s => s.classList.remove("active"));

    document.getElementById(id).classList.add("active");
}

/* =========================
   CINEMATIC START
========================= */

function startSequence(){

    const val = document.getElementById("rnaInput").value.trim();

    if(val !== correctRNA) return;

    show("screen2");

    // TEXT FADE IN
    setTimeout(() => {
        document.getElementById("t1").classList.add("showText");
    }, 800);

    // RNA REVEAL
    setTimeout(() => {
        document.getElementById("rna").classList.add("rnaActive");
    }, 1500);

    // VIRUS BUILD
    setTimeout(() => {
        document.getElementById("virusCore").classList.add("coreActive");
    }, 2500);

    // INFECTION SHIFT
    setTimeout(() => {
        show("screen3");
    }, 5500);

    setTimeout(() => {
        document.getElementById("t2").classList.add("showText");
        document.getElementById("t3").classList.add("showText");
    }, 6000);

    // MOVE TO NAME
    setTimeout(() => {
        show("screen4");
    }, 9000);
}

/* =========================
   NAME CHECK
========================= */

function checkName(){

    const val = document.getElementById("nameInput").value.trim().toLowerCase();

    if(val === "genesis"){
        show("screen5");

        setTimeout(() => {
            document.getElementById("finalText").classList.add("showText");
        }, 1000);
    }
}

</script>

</body>
</html>
