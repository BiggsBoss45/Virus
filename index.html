<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GENESIS SIMULATION CORE</title>

<style>
body{
    margin:0;
    background:#05070a;
    overflow:hidden;
    font-family:monospace;
    color:#7fffd4;
}

/* UI */
#ui{
    position:absolute;
    top:15px;
    width:100%;
    text-align:center;
    z-index:10;
}

input,button{
    background:#000;
    border:1px solid #7fffd4;
    color:#7fffd4;
    padding:10px;
}

/* LOG */
#log{
    position:absolute;
    bottom:15px;
    width:100%;
    width:100%;
    text-align:center;
}

/* SPACE */
#space{
    position:relative;
    width:100vw;
    height:100vh;
    perspective:1400px;
}

#camera{
    position:absolute;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition: transform 1.5s ease-in-out;
}

/* =========================
   E.COLI
========================= */
#bacteria{
    position:absolute;
    width:320px;
    height:120px;
    top:55%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.9);
    border-radius:60px;
    background:linear-gradient(90deg,
        rgba(0,255,200,0.15),
        rgba(0,255,200,0.05),
        rgba(0,255,200,0.15)
    );
    border:1px solid rgba(127,255,212,0.4);
    box-shadow: inset 0 0 30px rgba(0,255,200,0.15);
    overflow:hidden;
}

/* NUCLEOID */
#nucleoid{
    position:absolute;
    width:120px;
    height:60px;
    top:30px;
    left:90px;
    background:rgba(255,255,255,0.05);
    border-radius:50%;
    filter:blur(1px);
}

/* =========================
   PHAGE (SMALL + TOP DOWN)
========================= */
#virusContainer{
    position:absolute;
    top:15%;
    left:50%;
    width:90px;
    height:140px;
    transform:translateX(-50%) scale(0);
    opacity:0;
    transition:all 0.8s ease;
}

/* capsid */
#capsidShell{
    width:55px;
    height:55px;
    margin:0 auto;
    border-radius:10px;
    background:radial-gradient(circle,#7fffd4,#0a1a1a);
    border:1px solid #7fffd4;
}

/* tail */
#tailTube{
    width:8px;
    height:50px;
    margin:0 auto;
    background:rgba(127,255,212,0.25);
    border:1px solid #7fffd4;
}

/* syringe injector */
#injector{
    width:2px;
    height:0px;
    margin:0 auto;
    background:#7fffd4;
    transition:height 0.6s ease;
}

/* fibers */
.fiber{
    position:absolute;
    width:25px;
    height:2px;
    background:#7fffd4;
    top:90px;
    left:50%;
    transform-origin:left;
    opacity:0.6;
}

.f1{transform:rotate(20deg);}
.f2{transform:rotate(60deg);}
.f3{transform:rotate(-20deg);}
.f4{transform:rotate(-60deg);}

/* RNA */
.rnaChar{
    position:absolute;
    font-size:18px;
    color:#7fffd4;
    transition:all 1s ease;
}
</style>
</head>

<body>

<div id="ui">
    <input id="rnaInput" placeholder="Enter RNA sequence">
    <button id="runBtn">GENERATE</button>
</div>

<div id="space">
<div id="camera">

    <div id="virusContainer">
        <div id="capsidShell"></div>
        <div id="tailTube"></div>
        <div id="injector"></div>

        <div class="fiber f1"></div>
        <div class="fiber f2"></div>
        <div class="fiber f3"></div>
        <div class="fiber f4"></div>
    </div>

    <div id="bacteria">
        <div id="nucleoid"></div>
    </div>

</div>
</div>

<div id="log">Awaiting sequence...</div>

<script>

const CORRECT_RNA = "AUGCGAUCGUAACGUGCUAUGCGA";

const runBtn = document.getElementById("runBtn");
const rnaInput = document.getElementById("rnaInput");

const virus = document.getElementById("virusContainer");
const bacteria = document.getElementById("bacteria");
const logBox = document.getElementById("log");
const camera = document.getElementById("camera");

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
}

/* =========================
   VALIDATION
========================= */
function validateRNA(rna){
    const clean = rna.toUpperCase().trim();

    if(!/^[AUGC]+$/.test(clean))
        return {ok:false, msg:"INVALID RNA BASES"};

    if(clean !== CORRECT_RNA)
        return {ok:false, msg:"SEQUENCE NOT RECOGNIZED"};

    return {ok:true, clean};
}

/* =========================
   CAMERA ZOOM IN
========================= */
async function zoomIn(){
    camera.style.transform = "translateZ(-200px) scale(1.6)";
    await sleep(900);
}

/* =========================
   RNA EFFECT
========================= */
async function renderRNA(rna){

    logBox.innerText = "RNA FRAGMENT DETECTED...";

    for(let c of rna){
        const el = document.createElement("div");
        el.className = "rnaChar";
        el.innerText = c;

        el.style.left = (40 + Math.random()*20) + "%";
        el.style.top = (35 + Math.random()*20) + "%";

        document.body.appendChild(el);
        await sleep(40);
    }

    await sleep(700);

    document.querySelectorAll(".rnaChar").forEach(e=>{
        e.style.left = "50%";
        e.style.top = "45%";
        e.style.opacity = "0";
    });

    await sleep(900);

    document.querySelectorAll(".rnaChar").forEach(e=>e.remove());
}

/* =========================
   PHAGE DESCENDS FROM TOP
========================= */
async function spawnPhage(){

    logBox.innerText = "BACTERIOPHAGE APPROACHING FROM ABOVE...";

    virus.style.opacity = 1;
    virus.style.transform = "translateX(-50%) scale(0.7)";
    virus.style.top = "10%";

    await sleep(800);

    virus.style.top = "38%"; // move down toward E.coli

    await sleep(900);
}

/* =========================
   INJECTION (SYRINGE DOWNWARD)
========================= */
async function inject(){

    logBox.innerText = "TAIL FIBERS DOCKING...";

    await sleep(600);

    logBox.innerText = "INJECTOR EXTENDING...";

    document.getElementById("injector").style.height = "90px";

    bacteria.style.boxShadow = "0 0 40px #ff0033";
    bacteria.style.transform = "translate(-50%,-50%) scale(0.95)";

    await sleep(1000);
}

/* =========================
   MUTATION REVEAL
========================= */
async function mutate(){

    logBox.innerText = "HOST REPROGRAMMING...";

    await sleep(800);

    bacteria.style.background =
        "radial-gradient(circle,#ff0033,#220000)";

    await sleep(700);

    logBox.innerText =
        "ANOMALY: MITOCHONDRIA-LIKE STRUCTURE FORMED INSIDE E.COLI";
}

/* =========================
   MAIN
========================= */
runBtn.onclick = async () => {

    const result = validateRNA(rnaInput.value);

    if(!result.ok){
        logBox.innerText = result.msg;
        return;
    }

    logBox.innerText = "SEQUENCE ACCEPTED";

    await renderRNA(result.clean);

    await zoomIn();
    await spawnPhage();
    await inject();
    await mutate();
};

</script>

</body>
</html>
