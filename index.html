<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GENESIS SIMULATION CORE - FIXED</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:#00ffcc;
}

#space{
    position:relative;
    width:100vw;
    height:100vh;
    perspective:1200px;
    overflow:hidden;
}

#camera{
    position:absolute;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition: transform 2s ease-in-out;
}

.layer-back,.layer-mid,.layer-front{
    position:absolute;
    width:100%;
    height:100%;
}

.layer-back{transform:translateZ(-600px) scale(2);opacity:0.25;}
.layer-mid{transform:translateZ(-200px) scale(1.3);opacity:0.5;}

.star,.particle{
    position:absolute;
    background:#00ffcc;
    border-radius:50%;
}

.star{width:2px;height:2px;}
.particle{width:6px;height:6px;opacity:0.2;}

#virusCore{
    width:70px;height:70px;
    border-radius:50%;
    position:absolute;
    top:50%;left:40%;
    transform:scale(0);
    opacity:0;
    background:radial-gradient(circle,#00ffcc,#003333);
    box-shadow:0 0 25px #00ffcc;
}

#bacteria{
    width:160px;height:160px;
    border-radius:50%;
    position:absolute;
    top:50%;left:55%;
    border:2px solid #00ffcc;
    opacity:0;
}

#capsid{
    position:absolute;
    width:120px;height:120px;
    top:50%;left:50%;
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
}

.node{
    position:absolute;
    width:10px;height:10px;
    border-radius:50%;
    background:#00ffcc;
}

.edge{
    position:absolute;
    height:2px;
    background:#00ffcc;
    transform-origin:left center;
}

#ui{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    z-index:9999;
    pointer-events:auto;
}

#ui input,
#ui button{
    pointer-events:auto;
}

#space{
    pointer-events:none;
}

#space *{
    pointer-events:none;
}

input,button{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:10px;
}

button:hover{
    background:#00ffcc;
    color:black;
}

#rnaDisplay{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
}
</style>
</head>

<body>

<div id="ui">
    <input id="rnaInput" placeholder="Enter RNA sequence">
    <button onclick="startSimulation()">GENERATE</button>
</div>

<div id="space">
    <div id="camera">
        <div class="layer-back" id="back"></div>
        <div class="layer-mid" id="mid"></div>

        <div class="layer-front">
            <div id="virusCore"></div>
            <div id="bacteria"></div>
            <div id="capsid"></div>
        </div>
    </div>
</div>

<div id="rnaDisplay"></div>

<script>

const camera = document.getElementById("camera");
const virusCore = document.getElementById("virusCore");
const bacteria = document.getElementById("bacteria");
const capsid = document.getElementById("capsid");
const rnaDisplay = document.getElementById("rnaDisplay");

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
}

/* ===== CAPSIDS ===== */
function createNode(x,y){
    const n = document.createElement("div");
    n.className = "node";
    n.style.left = x+"px";
    n.style.top = y+"px";
    capsid.appendChild(n);
}

function createEdge(a,b){
    const e = document.createElement("div");
    e.className = "edge";

    const dx = b.x - a.x;
    const dy = b.y - a.y;

    const len = Math.sqrt(dx*dx+dy*dy);

    e.style.width = len+"px";
    e.style.left = a.x+"px";
    e.style.top = a.y+"px";
    e.style.transform = `rotate(${Math.atan2(dy,dx)}rad)`;

    capsid.appendChild(e);
}

async function buildCapsid(){
    capsid.innerHTML="";
    capsid.style.opacity=1;
    capsid.style.transform="translate(-50%,-50%) scale(1)";

    const pts = [
        {x:60,y:20},{x:90,y:40},{x:90,y:80},
        {x:60,y:100},{x:30,y:80},{x:30,y:40}
    ];

    pts.forEach(p=>createNode(p.x,p.y));

    for(let i=0;i<pts.length;i++){
        createEdge(pts[i], pts[(i+1)%pts.length]);
        await sleep(120);
    }
}

/* ===== VIRUS DOCK ===== */
async function dockVirus(){
    virusCore.style.opacity=1;
    virusCore.style.transform="scale(1) translate(120px,10px)";

    await sleep(1200);

    virusCore.style.transform="scale(1.2) translate(105px,5px)";
    bacteria.style.opacity=1;
    bacteria.style.borderColor="red";
}

/* ===== MAIN ===== */
async function startSimulation(){

    const rna = document.getElementById("rnaInput").value;

    if(!rna){
        alert("Enter RNA first");
        return;
    }

    rnaDisplay.innerText="RNA LOADED: "+rna;

    await sleep(500);

    await buildCapsid();
    await dockVirus();

    camera.style.transform="translateZ(-300px) scale(1.5)";
    await sleep(1000);

    bacteria.style.background="radial-gradient(circle,#ff0044,#220000)";
    bacteria.style.transform="scale(1.2)";

    rnaDisplay.innerText="RESULT: HOST MODIFIED (HYPOTHETICAL SIMULATION)";
}

</script>

</body>
</html>
