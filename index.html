<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GENESIS SIMULATION CORE</title>

<style>
body{
    margin:0;
    background:#05070a;
    overflow:hidden;
    font-family:monospace;
    color:#7fffd4;
}

/* UI */
#ui{
    position:absolute;
    top:15px;
    width:100%;
    text-align:center;
    z-index:10;
}

input,button{
    background:#000;
    border:1px solid #7fffd4;
    color:#7fffd4;
    padding:10px;
}

/* LOG */
#log{
    position:absolute;
    bottom:15px;
    width:100%;
    text-align:center;
}

/* SPACE */
#space{
    position:relative;
    width:100vw;
    height:100vh;
    perspective:1400px;
}

#camera{
    position:absolute;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition: transform 1.5s ease-in-out;
}

/* =========================
   E.COLI
========================= */
#bacteria{
    position:absolute;
    width:320px;
    height:120px;
    top:55%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.9);
    border-radius:60px;
    background:linear-gradient(90deg,
        rgba(0,255,200,0.15),
        rgba(0,255,200,0.05),
        rgba(0,255,200,0.15)
    );
    border:1px solid rgba(127,255,212,0.4);
    box-shadow: inset 0 0 30px rgba(0,255,200,0.15);
    overflow:hidden;
}

/* nucleoid */
#nucleoid{
    position:absolute;
    width:120px;
    height:60px;
    top:30px;
    left:90px;
    background:rgba(255,255,255,0.05);
    border-radius:50%;
    filter:blur(1px);
}

/* MITOCHONDRIA */
#mitochondria{
    position:absolute;
    width:80px;
    height:40px;
    border-radius:50px;
    top:40px;
    left:120px;
    background:radial-gradient(circle,#ffcc00,#ff6600);
    box-shadow:0 0 20px rgba(255,140,0,0.6);
    opacity:0;
    transform:scale(0);
    transition:all 1.2s ease;
}

/* =========================
   PHAGE
========================= */
#virusContainer{
    position:absolute;
    top:0;
    left:50%;
    transform:translate(-50%, -10%) scale(0.65);
    width:90px;
    height:140px;
    opacity:0;
    transition:all 1.2s ease;
    z-index:5;
}

/* capsid */
#capsidShell{
    width:55px;
    height:55px;
    margin:0 auto;
    border-radius:10px;
    background:radial-gradient(circle,#7fffd4,#0a1a1a);
    border:1px solid #7fffd4;
}

/* tail */
#tailTube{
    width:8px;
    height:50px;
    margin:0 auto;
    background:rgba(127,255,212,0.25);
    border:1px solid #7fffd4;
}

/* injector */
#injector{
    width:2px;
    height:0px;
    margin:0 auto;
    background:#7fffd4;
    transition:height 0.6s ease;
}

/* RNA payload */
#rnaPayload{
    position:absolute;
    top:20px;
    left:50%;
    width:6px;
    height:6px;
    border-radius:50%;
    background:#7fffd4;
    transform:translateX(-50%);
    opacity:0;
    box-shadow:0 0 10px #7fffd4;
    transition:all 1.2s ease-in-out;
}

#organismPanel{
    position:absolute;
    top:70px;
    width:100%;
    text-align:center;
    color:#7fffd4;
}

#organismPrompt{
    margin-bottom:10px;
    font-size:18px;
}

/* fibers */
.fiber{
    position:absolute;
    width:25px;
    height:2px;
    background:#7fffd4;
    top:90px;
    left:50%;
    transform-origin:left;
    opacity:0.6;
}

.f1{transform:rotate(20deg);}
.f2{transform:rotate(60deg);}
.f3{transform:rotate(-20deg);}
.f4{transform:rotate(-60deg);}

/* RNA text */
.rnaChar{
    position:absolute;
    font-size:18px;
    color:#7fffd4;
    transition:all 1s ease;
}
</style>
</head>

<body>

<div id="ui">
    <input id="rnaInput" placeholder="Enter RNA sequence">
    <button id="runBtn">GENERATE</button>
</div>

<button id="identifyBtn" style="display:none;">
    IDENTIFY NEW ORGANISM
</button>

<div id="organismPanel" style="display:none; margin-top:10px;">
    <div id="organismPrompt">Enterobacteria ————</div>
    <input id="organismInput" placeholder="Enter classification">
    <button id="submitOrg">SUBMIT</button>
</div>

<div id="space">
<div id="camera">

    <div id="virusContainer">
        <div id="capsidShell"></div>
        <div id="tailTube"></div>
        <div id="injector"></div>
        <div id="rnaPayload"></div>

        <div class="fiber f1"></div>
        <div class="fiber f2"></div>
        <div class="fiber f3"></div>
        <div class="fiber f4"></div>
    </div>

    <div id="bacteria">
        <div id="nucleoid"></div>
        <div id="mitochondria"></div>
    </div>

</div>
</div>

<div id="log">Awaiting sequence...</div>

<script>

const CORRECT_RNA = "AUGCGAUCGUAACGUGCUAUGCGA";

const runBtn = document.getElementById("runBtn");
const rnaInput = document.getElementById("rnaInput");

const virus = document.getElementById("virusContainer");
const bacteria = document.getElementById("bacteria");
const logBox = document.getElementById("log");
const camera = document.getElementById("camera");

const DOCK_Y = "52%";  // aligns with top of your E. coli body

const rnaPayload = document.getElementById("rnaPayload");
const mito = document.getElementById("mitochondria");

const identifyBtn = document.getElementById("identifyBtn");
const organismPanel = document.getElementById("organismPanel");
const organismInput = document.getElementById("organismInput");
const submitOrg = document.getElementById("submitOrg");
const log = document.getElementById("log");
function sleep(ms){
    
    return new Promise(r => setTimeout(r, ms));
}

/* RESET */
function reset(){

    virus.style.opacity = 0;
    virus.style.transform = "translate(-50%, -20%) scale(0.4)";

    rnaPayload.style.opacity = 0;

    mito.style.opacity = 0;
    mito.style.transform = "scale(0)";

    identifyBtn.style.display = "none";
    organismPanel.style.display = "none";

    bacteria.style.background =
        "linear-gradient(90deg, rgba(0,255,200,0.15), rgba(0,255,200,0.05), rgba(0,255,200,0.15))";
}

/* VALIDATION */
function validateRNA(rna){
    const clean = rna.toUpperCase().trim();

    if(!/^[AUGC]+$/.test(clean))
        return {ok:false};

    if(clean !== CORRECT_RNA)
        return {ok:false};

    return {ok:true, clean};
}

function showOrganismImage(){

    const img = document.createElement("img");

    img.src = "Genesis.jpg";
    img.style.position = "absolute";
    img.style.top = "50%";
    img.style.left = "50%";
    img.style.transform = "translate(-50%,-50%) scale(0)";
    img.style.transition = "all 1.5s ease";
    img.style.maxWidth = "60%";
img.style.opacity = "0";
img.style.boxShadow = "0 0 40px #7fffd4";

    document.getElementById("space").style.display = "none";
document.getElementById("ui").style.display = "none";

document.body.appendChild(img);

    setTimeout(() => {
        img.style.transform =
    "translate(-50%,-50%) scale(1)";

img.style.opacity = "1";
    }, 100);
}
/* CAMERA */
async function zoom(){
    camera.style.transform = "translateZ(-250px) scale(1.6)";
    await sleep(800);
}

/* RNA → VIRUS */
async function assembleRNA(){
    logBox.innerText = "RNA PACKAGING INTO VIRUS...";

    rnaPayload.style.opacity = 1;
    await sleep(600);

    rnaPayload.style.top = "70px";
    await sleep(600);

    rnaPayload.style.top = "110px";
    await sleep(600);
}

/* VIRUS DESCEND */
async function spawnPhage(){

    logBox.innerText = "BACTERIOPHAGE DESCENDING...";

    virus.style.opacity = 1;

    // start above cell
    virus.style.top = "5%";
    virus.style.transform = "translateX(-50%) scale(0.65)";

    await sleep(900);

    // approach cell surface
    virus.style.top = "30%";

    await sleep(900);

    // final docking position (ON membrane)
    virus.style.top = DOCK_Y;

    virus.style.transform = "translateX(-50%) scale(0.6) rotate(2deg)";

    await sleep(700);
}
/* INJECTION */
async function inject(){
    logBox.innerText = "INJECTOR ACTIVATED...";

    document.getElementById("injector").style.height = "90px";

    rnaPayload.style.top = "150px";
    rnaPayload.style.left = "50%";

    await sleep(900);

    rnaPayload.style.top = "60px";
    rnaPayload.style.left = "45%";

    logBox.innerText = "RNA ENTERED NUCLEOID";
}

/* MITOCHONDRIA EMERGENCE */
async function mitoRise(){

    logBox.innerText = "BIOLOGICAL ANOMALY FORMING...";

    await sleep(700);

    mito.style.opacity = 1;
    mito.style.transform = "scale(1)";

    await sleep(600);
    mito.style.boxShadow = "0 0 50px orange";

    await sleep(700);
    mito.style.transform = "scale(1.2)";

    await sleep(700);

    logBox.innerText =
"MITOCHONDRIA-LIKE STRUCTURE STABILIZED";

await sleep(1000);

identifyBtn.style.display = "inline-block";

logBox.innerText =
"NEW ORGANISM DETECTED - IDENTIFICATION AVAILABLE";
}

/* MAIN */
runBtn.onclick = async () => {

    reset();

    const result = validateRNA(rnaInput.value);
    if(!result.ok){
        logBox.innerText = "INVALID OR INCORRECT RNA";
        return;
    }

    logBox.innerText = "SEQUENCE ACCEPTED";

    await zoom();
    await spawnPhage();
    await assembleRNA();
    await inject();
    await mitoRise();
};

identifyBtn.onclick = () => {
    organismPanel.style.display = "block";
    logBox.innerText = "CLASSIFICATION REQUIRED: UNKNOWN ORGANISM DETECTED";
};

submitOrg.onclick = () => {

    const answer = organismInput.value.trim().toLowerCase();

    if(answer === "genesis"){

        logBox.innerText = "CLASSIFICATION ACCEPTED";

        showOrganismImage();
    } else {
        logBox.innerText = "INCORRECT CLASSIFICATION";
    }
};
</script>

</body>
</html>
