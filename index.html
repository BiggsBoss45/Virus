<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GENESIS SIMULATION CORE - FIXED</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:#00ffcc;
}

/* UI */
#ui{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    z-index:10;
}

input,button{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:10px;
    font-family:monospace;
}

button:hover{
    background:#00ffcc;
    color:black;
}

#log{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    color:#00ffcc;
}

/* SPACE */
#space{
    position:relative;
    width:100vw;
    height:100vh;
    perspective:1200px;
}

#camera{
    position:absolute;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition: transform 2s ease-in-out;
}

/* VIRUS */
#virusContainer{
    position:absolute;
    top:40%;
    left:35%;
    width:220px;
    height:260px;
    transform:scale(0);
    opacity:0;
    transition:all 1s ease;
}

#capsidShell{
    width:100px;
    height:100px;
    position:absolute;
    left:60px;
    top:0;
    clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
    border:2px solid #00ffcc;
    box-shadow:0 0 20px #00ffcc;
}

#tailTube{
    position:absolute;
    width:20px;
    height:70px;
    left:100px;
    top:100px;
    border:2px solid #00ffcc;
}

#injector{
    position:absolute;
    width:4px;
    height:0px;
    left:108px;
    top:170px;
    background:#00ffcc;
    transition:height 0.8s ease;
}

/* legs */
.leg{
    position:absolute;
    width:60px;
    height:2px;
    background:#00ffcc;
    top:150px;
    left:110px;
}

/* BACTERIA */
#bacteria{
    position:absolute;
    width:180px;
    height:180px;
    border-radius:50%;
    border:2px solid #00ffcc;
    top:50%;
    left:60%;
    transform:scale(0);
    opacity:0;
    transition:all 1s ease;
}
</style>
</head>

<body>

<div id="ui">
    <input id="rnaInput" placeholder="Enter RNA sequence">
    <button id="runBtn">GENERATE</button>
</div>

<div id="space">
    <div id="camera">

        <div id="virusContainer">
            <div id="capsidShell"></div>
            <div id="tailTube"></div>
            <div id="injector"></div>

            <div class="leg"></div>
            <div class="leg"></div>
            <div class="leg"></div>
            <div class="leg"></div>
            <div class="leg"></div>
            <div class="leg"></div>
        </div>

        <div id="bacteria"></div>

    </div>
</div>

<div id="log">Awaiting sequence...</div>

<script>

const CORRECT_RNA = "AUGCGAUCGUAACGUGCUAUGCGA";

const runBtn = document.getElementById("runBtn");
const rnaInput = document.getElementById("rnaInput");

const virus = document.getElementById("virusContainer");
const bacteria = document.getElementById("bacteria");
const injector = document.getElementById("injector");
const logBox = document.getElementById("log");

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
}

/* =========================
   RNA VALIDATION
========================= */
function validateRNA(rna){

    const clean = rna.toUpperCase().trim();

    if(!clean){
        return {ok:false, msg:"EMPTY SEQUENCE"};
    }

    if(!/^[AUGC]+$/.test(clean)){
        return {ok:false, msg:"INVALID BASES (ONLY A U G C ALLOWED)"};
    }

    if(clean !== CORRECT_RNA){
        return {ok:false, msg:"SEQUENCE REJECTED"};
    }

    return {ok:true, clean};
}

/* =========================
   MAIN ANIMATION
========================= */
async function run(){

    const result = validateRNA(rnaInput.value);

    if(!result.ok){
        logBox.innerText = result.msg;
        return;
    }

    logBox.innerText = "SEQUENCE ACCEPTED";

    await sleep(800);

    /* virus appears */
    virus.style.opacity = 1;
    virus.style.transform = "scale(1)";

    logBox.innerText = "VIRUS ASSEMBLING...";

    await sleep(1000);

    /* dock */
    virus.style.left = "45%";
    virus.style.top = "45%";

    await sleep(1000);

    /* inject */
    injector.style.height = "120px";
    bacteria.style.opacity = 1;
    bacteria.style.transform = "scale(1.1)";
    bacteria.style.borderColor = "red";

    logBox.innerText = "INJECTION EVENT";

    await sleep(1000);

    /* mutation */
    bacteria.style.background =
        "radial-gradient(circle,#ff0044,#220000)";

    logBox.innerText =
        "HOST MODIFIED: MITOCHONDRIAL-LIKE STRUCTURE FORMED";
}

/* BUTTON FIX */
runBtn.addEventListener("click", run);

</script>

</body>
</html>
