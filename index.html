<!DOCTYPE html>
<html>
<head>
<title>AAA VIRUS SIMULATION</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:monospace;
}

canvas{
    display:block;
}

/* UI */
#ui{
    position:absolute;
    top:20px;
    left:20px;
    z-index:10;
}

input, button{
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    padding:10px;
    font-family:monospace;
}

/* subtle glow overlay (fake bloom) */
#bloom{
    position:absolute;
    inset:0;
    background:radial-gradient(circle at center, rgba(0,255,200,0.08), transparent 60%);
    pointer-events:none;
    mix-blend-mode:screen;
}
</style>
</head>

<body>

<div id="ui">
    <input id="rna" placeholder="RNA sequence">
    <button onclick="start()">INITIATE</button>
</div>

<div id="bloom"></div>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

/* =========================
   CAMERA SYSTEM (AAA CORE)
========================= */

let cam = {
    x:0,
    y:0,
    zoom:1,
    shake:0
};

function applyCamera(){
    ctx.setTransform(
        cam.zoom, 0,
        0, cam.zoom,
        cam.x + (Math.random()-0.5)*cam.shake,
        cam.y + (Math.random()-0.5)*cam.shake
    );
}

function resetCamera(){
    ctx.setTransform(1,0,0,1,0,0);
}

/* =========================
   STATE
========================= */

let stage = 0;
let particles = [];
let virus = null;
let cell = null;

/* =========================
   RNA
========================= */

function createRNA(str){
    particles = [];

    for(let i=0;i<str.length;i++){
        particles.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            tx: canvas.width/2 + (Math.random()-0.5)*180,
            ty: canvas.height/2 + (Math.random()-0.5)*180,
            char: str[i]
        });
    }
}

/* =========================
   VIRUS
========================= */

function buildVirus(){
    virus = {
        x: canvas.width/2,
        y: canvas.height/2,
        r: 70,
        rot:0
    };
}

/* =========================
   CELL
========================= */

function createCell(){
    cell = {
        x: canvas.width*0.75,
        y: canvas.height/2,
        r: 100,
        pulse:0,
        mutated:false
    };
}

/* =========================
   START
========================= */

function start(){
    const val = document.getElementById("rna").value.trim();
    if(!val) return;

    createRNA(val);
    createCell();

    stage = 1;
}

/* =========================
   DRAW LOOP
========================= */

function draw(){

    // background fade (motion persistence)
    ctx.fillStyle="rgba(0,0,0,0.35)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    resetCamera();
    applyCamera();

    /* =========================
       STAGE 1 RNA
    ========================= */

    if(stage === 1){

        let done = true;

        particles.forEach(p=>{
            p.x += (p.tx - p.x)*0.06;
            p.y += (p.ty - p.y)*0.06;

            ctx.fillStyle="#00ffcc";
            ctx.fillText(p.char, p.x, p.y);

            if(Math.abs(p.x-p.tx)>1) done=false;
        });

        if(done){
            buildVirus();
            stage = 2;
        }
    }

    /* =========================
       STAGE 2 VIRUS BUILD
    ========================= */

    if(stage >= 2 && virus){

        virus.rot += 0.02;

        ctx.strokeStyle="#00ffcc";
        ctx.beginPath();
        ctx.arc(virus.x, virus.y, virus.r, 0, Math.PI*2);
        ctx.stroke();

        // spikes
        for(let i=0;i<14;i++){
            let a = i*(Math.PI*2/14)+virus.rot;

            let x1 = virus.x + Math.cos(a)*virus.r;
            let y1 = virus.y + Math.sin(a)*virus.r;

            let x2 = virus.x + Math.cos(a)*(virus.r+30);
            let y2 = virus.y + Math.sin(a)*(virus.r+30);

            ctx.beginPath();
            ctx.moveTo(x1,y1);
            ctx.lineTo(x2,y2);
            ctx.stroke();
        }

        virus.x += (cell.x - virus.x)*0.01;
        virus.y += (cell.y - virus.y)*0.01;

        if(Math.abs(virus.x-cell.x)<5){
            stage = 3;

            // 🔥 INFECTION IMPACT
            cam.shake = 25;
            cam.zoom = 1.6;

            setTimeout(()=>{
                cam.shake = 0;
                cam.zoom = 1;
                stage = 4;
            }, 800);
        }
    }

    /* =========================
       STAGE 3 (FLASH ONLY)
    ========================= */

    if(stage === 3){
        ctx.fillStyle="rgba(0,255,200,0.25)";
        ctx.beginPath();
        ctx.arc(cell.x,cell.y,200,0,Math.PI*2);
        ctx.fill();
    }

    /* =========================
       STAGE 4 MUTATION
    ========================= */

    if(stage === 4){

        cell.pulse += 0.05;

        // cell body
        ctx.strokeStyle="#00ffcc";
        ctx.beginPath();
        ctx.arc(cell.x, cell.y, cell.r, 0, Math.PI*2);
        ctx.stroke();

        // internal “mitochondria-like nodes”
        for(let i=0;i<8;i++){
            let a = i*(Math.PI*2/8)+cell.pulse;

            let mx = cell.x + Math.cos(a)*35;
            let my = cell.y + Math.sin(a)*35;

            ctx.fillStyle="#00ffcc";
            ctx.beginPath();
            ctx.arc(mx,my,6,0,Math.PI*2);
            ctx.fill();
        }

        ctx.fillStyle="#00ffcc";
        ctx.font="18px monospace";
        ctx.fillText("MUTATION COMPLETE: ORGANELLE STRUCTURE FORMED", 50, 60);
    }

    resetCamera();

    requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
