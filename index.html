<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GENESIS SIMULATION CORE - 3D SPACE</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:#00ffcc;
}

/* 3D SPACE */
#space{
    position:relative;
    width:100vw;
    height:100vh;
    perspective:1200px;
    overflow:hidden;
}

#camera{
    position:absolute;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition: transform 2s ease-in-out;
}

/* BACKGROUND */
.layer-back{
    position:absolute;
    width:100%;
    height:100%;
    transform:translateZ(-600px) scale(2);
    opacity:0.25;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:#00ffcc;
}

/* MID */
.layer-mid{
    position:absolute;
    width:100%;
    height:100%;
    transform:translateZ(-200px) scale(1.3);
    opacity:0.5;
}

.particle{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    background:#00ffcc;
    opacity:0.2;
}

/* FRONT */
.layer-front{
    position:absolute;
    width:100%;
    height:100%;
}

/* VIRUS */
#virusCore{
    width:70px;
    height:70px;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:40%;
    transform:scale(0);
    opacity:0;
    background:radial-gradient(circle,#00ffcc,#003333);
    box-shadow:0 0 25px #00ffcc;
}

/* BACTERIA */
#bacteria{
    width:160px;
    height:160px;
    border-radius:50%;
    border:2px solid #00ffcc;
    position:absolute;
    top:50%;
    left:55%;
    opacity:0;
    box-shadow:0 0 10px #00ffcc;
}

/* CAPSID */
#capsid{
    position:absolute;
    width:120px;
    height:120px;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    opacity:0;
}

.node{
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:#00ffcc;
}

.edge{
    position:absolute;
    height:2px;
    background:#00ffcc;
    transform-origin:left center;
}

#rnaChain{
    position:absolute;
    width:100%;
    text-align:center;
    top:45%;
    opacity:0;
}

input, button{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:10px;
}
</style>
</head>

<body>

<div id="space">
<div id="camera">

<div class="layer-back" id="back"></div>
<div class="layer-mid" id="mid"></div>

<div class="layer-front">

<div id="virusCore"></div>
<div id="bacteria"></div>
<div id="capsid"></div>
<div id="rnaChain"></div>

</div>

</div>
</div>

<div style="position:absolute;top:10px;width:100%;text-align:center;">
<input id="rnaInput" placeholder="Enter RNA">
<button onclick="startSimulation()">GENERATE</button>
</div>

<script>

const virusCore = document.getElementById("virusCore");
const bacteria = document.getElementById("bacteria");
const capsid = document.getElementById("capsid");
const rnaChain = document.getElementById("rnaChain");
const camera = document.getElementById("camera");

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* ===== CAPSID BUILD ===== */
async function buildCapsid(rna){

    rnaChain.innerText = "RNA: " + rna;
    rnaChain.style.opacity = 1;

    await sleep(800);

    rnaChain.style.opacity = 0;

    capsid.style.opacity = 1;
    capsid.style.transform = "translate(-50%,-50%) scale(1)";

    const points = [
        [0,-40],[35,-20],[35,20],
        [0,40],[-35,20],[-35,-20]
    ];

    let nodes = [];

    for(let i=0;i<points.length;i++){
        const n = document.createElement("div");
        n.className="node";
        n.style.left = (60+points[i][0])+"px";
        n.style.top = (60+points[i][1])+"px";
        capsid.appendChild(n);
        nodes.push(n);
        await sleep(150);
    }

    return true;
}

/* ===== DOCK ANIMATION ===== */
async function dockVirus(){

    virusCore.style.opacity = 1;
    virusCore.style.transform = "scale(1)";

    virusCore.style.transition = "all 2s ease";
    virusCore.style.transform = "translate(120px,10px) scale(1.1)";
    await sleep(1500);

    virusCore.style.transform = "translate(100px,-10px) scale(1.05)";
    await sleep(600);

    virusCore.style.transform = "translate(105px,5px) scale(1.25)";

    bacteria.style.opacity = 1;
    bacteria.style.boxShadow = "0 0 80px red";

    await sleep(500);
}

/* ===== MAIN ===== */
async function startSimulation(){

    const rna = document.getElementById("rnaInput").value;
    if(!rna) return alert("Enter RNA");

    camera.style.transform = "translateZ(0px) scale(1)";

    await buildCapsid(rna);
    await dockVirus();

    camera.style.transform = "translateZ(-300px) scale(1.8)";

    bacteria.style.background = "radial-gradient(circle,#ff0044,#220000)";
    bacteria.style.transform = "scale(1.2)";

    document.body.insertAdjacentHTML("beforeend",
      `<div style="position:absolute;bottom:20px;width:100%;text-align:center;color:#00ffcc">
        HOST MODIFICATION COMPLETE
      </div>`
    );
}

</script>

</body>
</html>
