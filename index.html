<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GENESIS SIMULATION CORE - CAMERA UPGRADE</title>

<style>
body{
    margin:0;
    background:#05070a;
    overflow:hidden;
    font-family:monospace;
    color:#7fffd4;
}

/* UI */
#ui{
    position:absolute;
    top:15px;
    width:100%;
    text-align:center;
    z-index:10;
}

input,button{
    background:#000;
    border:1px solid #7fffd4;
    color:#7fffd4;
    padding:10px;
}

button:hover{
    background:#7fffd4;
    color:black;
}

/* LOG */
#log{
    position:absolute;
    bottom:15px;
    width:100%;
    text-align:center;
}

/* SPACE */
#space{
    position:relative;
    width:100vw;
    height:100vh;
    perspective:1400px;
    overflow:hidden;
}

#camera{
    position:absolute;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition: transform 2.5s cubic-bezier(.2,.8,.2,1);
}

/* =========================
   BACTERIA
========================= */
#bacteria{
    position:absolute;
    width:320px;
    height:120px;
    top:50%;
    left:60%;
    transform:translate(-50%,-50%);
    border-radius:60px;
    background:rgba(0,255,200,0.08);
    border:1px solid rgba(127,255,212,0.4);
    box-shadow: inset 0 0 30px rgba(0,255,200,0.15);
    transition:all 1s ease;
}

/* membrane pulse on hit */
.hit{
    animation: pulse 0.6s ease;
}

@keyframes pulse{
    0%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.08);}
    100%{transform:translate(-50%,-50%) scale(1);}
}

/* =========================
   VIRUS
========================= */
#virusContainer{
    position:absolute;
    top:35%;
    left:30%;
    width:120px;
    height:220px;
    transform:scale(0);
    opacity:0;
    transition:all 1s ease;
}

/* capsid */
#capsidShell{
    width:70px;
    height:70px;
    margin:0 auto;
    border-radius:12px;
    background:radial-gradient(circle,#7fffd4,#001);
    border:1px solid #7fffd4;
}

/* tail */
#tailTube{
    width:10px;
    height:70px;
    margin:0 auto;
    background:rgba(127,255,212,0.2);
    border:1px solid #7fffd4;
}

/* syringe injector */
#injector{
    width:3px;
    height:0px;
    margin:0 auto;
    background:#7fffd4;
    transition:height 0.8s ease;
    box-shadow:0 0 10px #7fffd4;
}

/* legs */
.leg{
    position:absolute;
    width:50px;
    height:2px;
    background:#7fffd4;
    top:140px;
    left:50px;
    transform-origin:left;
    opacity:0.6;
}

.leg:nth-child(4){transform:rotate(20deg);}
.leg:nth-child(5){transform:rotate(60deg);}
.leg:nth-child(6){transform:rotate(-20deg);}
.leg:nth-child(7){transform:rotate(-60deg);}
.leg:nth-child(8){transform:rotate(120deg);}
.leg:nth-child(9){transform:rotate(-120deg);}

/* RNA */
.rnaChar{
    position:absolute;
    font-size:20px;
    color:#7fffd4;
    transition:all 1s ease;
}

/* RNA layer */
#rnaLayer{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="ui">
    <input id="rnaInput" placeholder="Enter RNA sequence">
    <button id="runBtn">GENERATE</button>
</div>

<div id="space">
    <div id="camera">

        <div id="rnaLayer"></div>

        <div id="virusContainer">
            <div id="capsidShell"></div>
            <div id="tailTube"></div>
            <div id="injector"></div>

            <div class="leg"></div>
            <div class="leg"></div>
            <div class="leg"></div>
            <div class="leg"></div>
            <div class="leg"></div>
            <div class="leg"></div>
        </div>

        <div id="bacteria"></div>

    </div>
</div>

<div id="log">Awaiting sequence...</div>

<script>

const CORRECT_RNA = "AUGCGAUCGUAACGUGCUAUGCGA";

const runBtn = document.getElementById("runBtn");
const rnaInput = document.getElementById("rnaInput");

const virus = document.getElementById("virusContainer");
const bacteria = document.getElementById("bacteria");
const logBox = document.getElementById("log");
const rnaLayer = document.getElementById("rnaLayer");
const camera = document.getElementById("camera");

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
}

/* =========================
   VALIDATION
========================= */
function validateRNA(rna){
    const clean = rna.toUpperCase().trim();

    if(!/^[AUGC]+$/.test(clean)){
        return {ok:false, msg:"INVALID RNA BASES"};
    }

    if(clean !== CORRECT_RNA){
        return {ok:false, msg:"SEQUENCE REJECTED"};
    }

    return {ok:true, clean};
}

/* =========================
   RNA VISUAL
========================= */
async function renderRNA(rna){

    rnaLayer.innerHTML = "";

    for(let c of rna){
        const el = document.createElement("div");
        el.className = "rnaChar";
        el.innerText = c;

        el.style.left = Math.random()*80 + "%";
        el.style.top = Math.random()*60 + "%";

        rnaLayer.appendChild(el);
        await sleep(50);
    }

    await sleep(700);

    document.querySelectorAll(".rnaChar").forEach(e=>{
        e.style.left = "50%";
        e.style.top = "45%";
        e.style.opacity = "0";
        e.style.transform = "translate(-50%,-50%) scale(0)";
    });

    await sleep(900);
    rnaLayer.innerHTML = "";
}

/* =========================
   VIRUS BUILD
========================= */
async function spawnVirus(){
    logBox.innerText = "VIRUS ASSEMBLING";

    virus.style.opacity = 1;
    virus.style.transform = "scale(1)";

    await sleep(800);

    document.getElementById("injector").style.height = "60px";
}

/* =========================
   CAMERA ZOOM (NEW)
========================= */
async function cameraZoom(){
    logBox.innerText = "ZOOMING INTO BIOLOGICAL TARGET";

    camera.style.transform =
        "translateZ(-500px) scale(2)";

    await sleep(1200);

    camera.style.transform =
        "translateZ(-800px) scale(3)";

    await sleep(1200);
}

/* =========================
   SYRINGE INJECTION (NEW)
========================= */
async function inject(){
    logBox.innerText = "INJECTION SEQUENCE INITIATED";

    // move virus onto bacteria
    virus.style.left = "45%";
    virus.style.top = "45%";

    await sleep(800);

    // extend syringe
    const injector = document.getElementById("injector");
    injector.style.height = "140px";

    // impact reaction
    bacteria.classList.add("hit");

    bacteria.style.boxShadow = "0 0 60px red";

    await sleep(600);

    bacteria.classList.remove("hit");

    await sleep(800);
}

/* =========================
   MUTATION
========================= */
async function mutate(){

    logBox.innerText = "HOST CELL REPROGRAMMING";

    bacteria.style.background =
        "radial-gradient(circle,#ff0033,#220000)";

    await sleep(800);

    logBox.innerText =
        "ANOMALY: MITOCHONDRIAL-LIKE STRUCTURE DETECTED";
}

/* =========================
   MAIN
========================= */
runBtn.onclick = async () => {

    const result = validateRNA(rnaInput.value);

    if(!result.ok){
        logBox.innerText = result.msg;
        return;
    }

    logBox.innerText = "SEQUENCE ACCEPTED";

    await sleep(400);

    await renderRNA(result.clean);
    await spawnVirus();

    await cameraZoom();   // ⭐ NEW
    await inject();       // ⭐ NEW

    await mutate();
};

</script>

</body>
</html>
