<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GENESIS SIMULATION CORE</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:#00ffcc;
}

/* CENTER CINEMATIC STAGE */
#stage{
    position:relative;
    width:100vw;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    perspective:1000px;
}

/* CAMERA */
#camera{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    transform:scale(1);
    transition: transform 2s ease-in-out;
}

/* VIRUS */
#virus{
    width:60px;
    height:60px;
    border-radius:50%;
    background:radial-gradient(circle, #00ffcc, #003333);
    box-shadow:0 0 20px #00ffcc;
    opacity:0;
    transform:scale(0);
    position:absolute;
}

/* RNA STRING */
#rnaDisplay{
    position:absolute;
    bottom:20px;
    text-align:center;
    width:100%;
    font-size:14px;
}

/* CELL */
#cell{
    width:180px;
    height:180px;
    border-radius:50%;
    border:2px solid #00ffcc;
    position:absolute;
    opacity:0;
    transform:scale(0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    transition: all 2s ease;
}

/* MITOCHONDRIA */
.mito{
    width:20px;
    height:10px;
    background:#00ffcc;
    border-radius:5px;
    position:absolute;
    opacity:0;
}

/* INPUT UI */
#ui{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
}

input{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:10px;
    width:300px;
}

button{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:10px;
    cursor:pointer;
}

button:hover{
    background:#00ffcc;
    color:black;
}
</style>
</head>

<body>

<div id="ui">
    <input id="rnaInput" placeholder="Enter RNA sequence">
    <button onclick="startSimulation()">GENERATE</button>
</div>

<div id="stage">

    <div id="camera">

        <div id="virus"></div>

        <div id="cell">
            <div class="mito" id="m1"></div>
            <div class="mito" id="m2"></div>
            <div class="mito" id="m3"></div>
        </div>

    </div>

</div>

<div id="rnaDisplay"></div>

<script>

const virus = document.getElementById("virus");
const cell = document.getElementById("cell");
const camera = document.getElementById("camera");
const rnaDisplay = document.getElementById("rnaDisplay");

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
}

async function startSimulation(){

    const rna = document.getElementById("rnaInput").value;

    if(!rna){
        alert("RNA sequence required");
        return;
    }

    // reset
    virus.style.opacity = 0;
    virus.style.transform = "scale(0)";
    cell.style.opacity = 0;
    cell.style.transform = "scale(0.5)";
    camera.style.transform = "scale(1)";
    rnaDisplay.innerText = "";

    // show RNA
    rnaDisplay.innerText = "RNA SEQUENCE LOCKED: " + rna;

    await sleep(1000);

    /* =========================
       VIRUS BUILD SEQUENCE
    ========================= */

    virus.style.opacity = 1;

    // capsid forming
    virus.style.transform = "scale(0.3)";
    await sleep(800);

    virus.style.transform = "scale(0.6)";
    await sleep(800);

    virus.style.transform = "scale(1)";
    await sleep(800);

    /* =========================
       CAMERA ZOOM IN (CINEMATIC)
    ========================= */

    camera.style.transform = "scale(1.8)";
    await sleep(1500);

    /* =========================
       CELL APPEARS
    ========================= */

    cell.style.opacity = 1;
    cell.style.transform = "scale(1)";

    await sleep(1000);

    /* MOVE VIRUS TO CELL */
    virus.style.transition = "all 2s ease-in-out";
    virus.style.transform = "translateY(120px) scale(1.2)";

    await sleep(2000);

    /* =========================
       INFECTION EVENT
    ========================= */

    cell.style.boxShadow = "0 0 40px red";

    /* MITOCHONDRIA MUTATION EVENT */
    document.getElementById("m1").style.opacity = 1;
    document.getElementById("m1").style.transform = "translate(-40px,-20px)";

    await sleep(400);

    document.getElementById("m2").style.opacity = 1;
    document.getElementById("m2").style.transform = "translate(20px,10px)";

    await sleep(400);

    document.getElementById("m3").style.opacity = 1;
    document.getElementById("m3").style.transform = "translate(-10px,40px)";

    /* FINAL ZOOM */
    await sleep(800);
    camera.style.transform = "scale(2.2)";

    rnaDisplay.innerText = "MUTATION COMPLETE: MITOCHONDRIA STRUCTURE FORMED";

}

</script>

</body>
</html>
