<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GENESIS SIMULATION CORE</title>

<style>
body{
    margin:0;
    background:#05070a;
    overflow:hidden;
    font-family:monospace;
    color:#7fffd4;
}

/* UI */
#ui{
    position:absolute;
    top:15px;
    width:100%;
    text-align:center;
    z-index:10;
}

input,button{
    background:#000;
    border:1px solid #7fffd4;
    color:#7fffd4;
    padding:10px;
}

button:hover{
    background:#7fffd4;
    color:black;
}

/* LOG */
#log{
    position:absolute;
    bottom:15px;
    width:100%;
    text-align:center;
}

/* SPACE */
#space{
    position:relative;
    width:100vw;
    height:100vh;
    perspective:1400px;
}

#camera{
    position:absolute;
    width:100%;
    height:100%;
}

/* =========================
   BACTERIA (MORE REALISTIC)
========================= */
#bacteria{
    position:absolute;
    width:320px;
    height:120px;
    top:50%;
    left:60%;
    transform:translate(-50%,-50%);
    border-radius:60px;
    background:rgba(0,255,200,0.08);
    border:1px solid rgba(127,255,212,0.4);
    box-shadow: inset 0 0 30px rgba(0,255,200,0.15);
    overflow:hidden;
    transition:all 1s ease;
}

/* nucleoid */
#nucleoid{
    position:absolute;
    width:140px;
    height:60px;
    top:30px;
    left:90px;
    border-radius:50%;
    background:rgba(255,255,255,0.05);
}

/* ribosomes */
.ribo{
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:#7fffd4;
    opacity:0.6;
    animation: drift 3s infinite ease-in-out;
}

@keyframes drift{
    0%{transform:translate(0,0);}
    50%{transform:translate(8px,-6px);}
    100%{transform:translate(0,0);}
}

/* =========================
   VIRUS
========================= */
#virusContainer{
    position:absolute;
    top:35%;
    left:30%;
    width:120px;
    height:220px;
    transform:scale(0);
    opacity:0;
    transition:all 1s ease;
}

#capsidShell{
    width:70px;
    height:70px;
    margin:0 auto;
    border-radius:12px;
    background:radial-gradient(circle,#7fffd4,#001);
    border:1px solid #7fffd4;
}

#tailTube{
    width:10px;
    height:70px;
    margin:0 auto;
    background:rgba(127,255,212,0.2);
    border:1px solid #7fffd4;
}

#injector{
    width:2px;
    height:0px;
    margin:0 auto;
    background:#7fffd4;
    transition:height 0.8s ease;
}

/* legs FIX */
.leg{
    position:absolute;
    width:50px;
    height:2px;
    background:#7fffd4;
    top:140px;
    left:50px;
    transform-origin:left;
    opacity:0.6;
}

.leg:nth-child(4){transform:rotate(20deg);}
.leg:nth-child(5){transform:rotate(60deg);}
.leg:nth-child(6){transform:rotate(-20deg);}
.leg:nth-child(7){transform:rotate(-60deg);}
.leg:nth-child(8){transform:rotate(120deg);}
.leg:nth-child(9){transform:rotate(-120deg);}

/* RNA */
.rnaChar{
    position:absolute;
    font-size:20px;
    color:#7fffd4;
    transition:all 1s ease;
}

/* =========================
   LAYER
========================= */
#rnaLayer{
    position:absolute;
    width:100%;
    height:100%;
    pointer-events:none;
}
</style>
</head>

<body>

<div id="ui">
    <input id="rnaInput" placeholder="Enter RNA sequence">
    <button id="runBtn">GENERATE</button>
</div>

<div id="space">
    <div id="camera">

        <div id="rnaLayer"></div>

        <div id="virusContainer">
            <div id="capsidShell"></div>
            <div id="tailTube"></div>
            <div id="injector"></div>

            <div class="leg"></div>
            <div class="leg"></div>
            <div class="leg"></div>
            <div class="leg"></div>
            <div class="leg"></div>
            <div class="leg"></div>
        </div>

        <div id="bacteria">
            <div id="nucleoid"></div>
        </div>

    </div>
</div>

<div id="log">Awaiting sequence...</div>

<script>

const CORRECT_RNA = "AUGCGAUCGUAACGUGCUAUGCGA";

const runBtn = document.getElementById("runBtn");
const rnaInput = document.getElementById("rnaInput");
const virus = document.getElementById("virusContainer");
const bacteria = document.getElementById("bacteria");
const logBox = document.getElementById("log");
const rnaLayer = document.getElementById("rnaLayer");

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
}

/* =========================
   VALIDATION FIXED
========================= */
function validateRNA(rna){
    const clean = rna.toUpperCase().trim();

    if(!/^[AUGC]+$/.test(clean)){
        return {ok:false, msg:"INVALID RNA BASES"};
    }

    if(clean !== CORRECT_RNA){
        return {ok:false, msg:"SEQUENCE REJECTED"};
    }

    return {ok:true, clean};
}

/* =========================
   RNA → VIRUS ASSEMBLY
========================= */
async function renderRNA(rna){

    rnaLayer.innerHTML = "";

    for(let c of rna){
        const el = document.createElement("div");
        el.className = "rnaChar";
        el.innerText = c;

        el.style.left = Math.random()*80 + "%";
        el.style.top = Math.random()*60 + "%";

        rnaLayer.appendChild(el);
        await sleep(50);
    }

    await sleep(800);

    document.querySelectorAll(".rnaChar").forEach(e=>{
        e.style.left = "45%";
        e.style.top = "40%";
        e.style.opacity = "0";
    });

    await sleep(1000);
    rnaLayer.innerHTML = "";
}

/* =========================
   VIRUS BUILD
========================= */
async function spawnVirus(){
    logBox.innerText = "VIRUS ASSEMBLING FROM RNA";

    virus.style.opacity = 1;
    virus.style.transform = "scale(1)";

    await sleep(900);

    document.getElementById("injector").style.height = "60px";
}

/* =========================
   INFECTION
========================= */
async function infect(){
    logBox.innerText = "DOCKING ON E.COLI";

    virus.style.left = "38%";
    virus.style.top = "45%";

    await sleep(1000);

    document.getElementById("injector").style.height = "120px";

    bacteria.style.transform = "scale(0.9)";
    bacteria.style.boxShadow = "0 0 40px red";

    await sleep(1000);
}

/* =========================
   MUTATION REVEAL
========================= */
async function mutate(){
    logBox.innerText = "HOST MODIFICATION DETECTED";

    await sleep(800);

    bacteria.style.background =
        "radial-gradient(circle,#ff0033,#220000)";

    logBox.innerText =
        "ANOMALY: MITOCHONDRIAL-LIKE STRUCTURE FORMED (HYPOTHETICAL)";
}

/* =========================
   MAIN
========================= */
runBtn.onclick = async () => {

    const result = validateRNA(rnaInput.value);

    if(!result.ok){
        logBox.innerText = result.msg;
        return;
    }

    logBox.innerText = "SEQUENCE ACCEPTED";

    await sleep(500);

    await renderRNA(result.clean);
    await spawnVirus();
    await infect();
    await mutate();
};

</script>

</body>
</html>
