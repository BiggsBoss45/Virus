<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GENESIS SIMULATION CORE - 3D SPACE</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:monospace;
    color:#00ffcc;
}

/* ======= 3D SPACE CONTAINER ======= */
#space{
    position:relative;
    width:100vw;
    height:100vh;
    perspective:1200px;
    overflow:hidden;
}

/* CAMERA (MOVES WHOLE UNIVERSE) */
#camera{
    position:absolute;
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transform:translateZ(0px) scale(1);
    transition: transform 2s ease-in-out;
}

/* ======= BACKGROUND LAYER ======= */
.layer-back{
    position:absolute;
    width:100%;
    height:100%;
    transform:translateZ(-600px) scale(2);
    opacity:0.25;
    filter:blur(1px);
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:#00ffcc;
    border-radius:50%;
    opacity:0.4;
}

/* ======= MID LAYER ======= */
.layer-mid{
    position:absolute;
    width:100%;
    height:100%;
    transform:translateZ(-200px) scale(1.3);
    opacity:0.5;
}

/* FLOATING PARTICLES */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    background:#00ffcc;
    opacity:0.2;
}

/* ======= ACTION LAYER ======= */
.layer-front{
    position:absolute;
    width:100%;
    height:100%;
    transform:translateZ(0px);
}

/* VIRUS */
#virus{
    width:60px;
    height:60px;
    border-radius:50%;
    background:radial-gradient(circle, #00ffcc, #003333);
    box-shadow:0 0 25px #00ffcc;
    position:absolute;
    top:50%;
    left:40%;
    transform:translateZ(0px) scale(0);
    opacity:0;
    transition: all 1.2s ease-in-out;
}

/* BACTERIA */
#bacteria{
    width:160px;
    height:160px;
    border-radius:50%;
    border:2px solid #00ffcc;
    position:absolute;
    top:50%;
    left:55%;
    transform:translateZ(0px) scale(1);
    opacity:0;
    box-shadow:0 0 10px #00ffcc;
    transition: all 1s ease;
}

/* RNA DISPLAY */
#rnaDisplay{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    z-index:10;
}

/* UI */
#ui{
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    z-index:10;
}

input, button{
    background:black;
    border:1px solid #00ffcc;
    color:#00ffcc;
    padding:10px;
    pointer-events:auto;
}

button:hover{
    background:#00ffcc;
    color:black;
}

/* SHAKE */
@keyframes shake {
    0% { transform: translate(0,0) scale(1.05); }
    25% { transform: translate(3px,-2px) scale(1.05); }
    50% { transform: translate(-3px,2px) scale(1.05); }
    75% { transform: translate(2px,2px) scale(1.05); }
    100% { transform: translate(0,0) scale(1.05); }
}
</style>
</head>

<body>

<div id="ui">
    <input id="rnaInput" placeholder="Enter RNA sequence">
    <button onclick="startSimulation()">GENERATE</button>
</div>

<div id="space">

    <div id="camera">

        <!-- BACK LAYER -->
        <div class="layer-back" id="back"></div>

        <!-- MID LAYER -->
        <div class="layer-mid" id="mid"></div>

        <!-- FRONT LAYER -->
        <div class="layer-front">

            <div id="virus"></div>
            <div id="bacteria"></div>

        </div>

    </div>
</div>

<div id="rnaDisplay"></div>

<script>

const camera = document.getElementById("camera");
const virus = document.getElementById("virus");
const bacteria = document.getElementById("bacteria");
const rnaDisplay = document.getElementById("rnaDisplay");

function sleep(ms){
    return new Promise(r => setTimeout(r, ms));
}

/* ======= GENERATE DEPTH FIELD ======= */
function generateSpace(){
    const back = document.getElementById("back");
    const mid = document.getElementById("mid");

    for(let i=0;i<80;i++){
        let s = document.createElement("div");
        s.className="star";
        s.style.top=Math.random()*100+"%";
        s.style.left=Math.random()*100+"%";
        back.appendChild(s);
    }

    for(let i=0;i<40;i++){
        let p = document.createElement("div");
        p.className="particle";
        p.style.top=Math.random()*100+"%";
        p.style.left=Math.random()*100+"%";
        mid.appendChild(p);
    }
}

generateSpace();

async function startSimulation(){

    const rna = document.getElementById("rnaInput").value;
    if(!rna){
        alert("RNA sequence required");
        return;
    }

    /* RESET */
    virus.style.opacity = 0;
    bacteria.style.opacity = 0;
    camera.style.transform = "translateZ(0px) scale(1)";
    rnaDisplay.innerText = "";

    bacteria.style.opacity = 1;

    rnaDisplay.innerText = "RNA SEQUENCE LOCKED: " + rna;

    await sleep(1000);

    /* VIRUS BUILD */
    virus.style.opacity = 1;
    virus.style.transform = "translateZ(0px) scale(0.3)";
    await sleep(600);

    virus.style.transform = "translateZ(0px) scale(0.6)";
    await sleep(600);

    virus.style.transform = "translateZ(0px) scale(1)";
    await sleep(800);

    /* CAMERA PUSH (DEPTH EFFECT) */
    camera.style.transform = "translateZ(-200px) scale(1.5)";
    await sleep(1200);

    /* APPROACH */
    virus.style.transform = "translate(20px,-10px) scale(1.1)";
    await sleep(900);

    virus.style.transform = "translate(40px,10px) scale(1.05)";
    await sleep(900);

    /* DOCK */
    virus.style.transform = "translate(50px,0px) scale(1.2)";
    bacteria.style.animation = "shake 0.4s";

    await sleep(400);
    bacteria.style.animation = "";

    /* ATTACH */
    virus.style.boxShadow = "0 0 40px red";
    bacteria.style.boxShadow = "0 0 60px red";
    bacteria.style.borderColor = "red";

    await sleep(900);

    /* MUTATION */
    bacteria.style.background = "radial-gradient(circle, #ff0044, #220000)";
    bacteria.style.transform = "scale(1.2)";

    camera.style.transform = "translateZ(-400px) scale(2)";

    rnaDisplay.innerText = "HOST MODIFICATION COMPLETE: GENESIS VARIANT FORMED";
}

</script>

</body>
</html>
